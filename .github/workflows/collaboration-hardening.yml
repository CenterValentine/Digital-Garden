name: Collaboration Hardening

on:
  pull_request:
    paths:
      - "app/api/collaboration/**"
      - "components/content/editor/**"
      - "lib/domain/collaboration/**"
      - "server/hocuspocus/**"
      - "scripts/validate-collaboration-schema.ts"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main

jobs:
  schema:
    name: Collaboration schema and types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate collaboration schema
        run: pnpm collab:schema:check
